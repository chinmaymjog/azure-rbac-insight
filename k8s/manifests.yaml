apiVersion: apps/v1
kind: Deployment
metadata:
  name: azrbac-insight
  labels:
    app: azrbac-insight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azrbac-insight
  template:
    metadata:
      labels:
        app: azrbac-insight
    spec:
      containers:
      - name: azrbac-insight
        image: azrbacinsight:latest # Replace with your container registry image path
        ports:
        - containerPort: 8501
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: azrbac-insight-service
spec:
  type: LoadBalancer # Change to ClusterIP if using Ingress
  selector:
    app: azrbac-insight
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
